floor: 46
tier: 5
biome: The Scorch
zone: The Ember Dunes
gate_town: Duneshade
banner: scorch
arrival: >-
  Wind-built dunes of ash and cinder, still holding last year's heat a
  hand's depth down. At night the dune faces glow in long slow bands,
  and the whole desert breathes orange. It is beautiful. Almost
  everything beautiful out here is a mouth.
encounters:
  - id: dune_swimmer
    name: Dune-swimmer salamander
    weight: 3
    prose: >-
      The wake comes first — a ridge of disturbed ash running at you
      through the dune, quick as a skipped stone. The salamander
      breaches at the last moment, jaws open, gloriously happy.
  - id: ember_ogre
    name: Ember-blind ogre
    weight: 3
    prose: >-
      An ogre wanders the dunes at night with its eyes wrapped, blind
      from staring into too many years of ember-glow. It navigates by
      smell now, and stops, and turns toward yours.
  - id: glow_moth_swarm
    name: Ember moths
    weight: 2
    prose: >-
      A drift of moths rises off a glowing dune face, each one carrying
      a live cinder in its belly. They are drawn to anything warmer
      than the desert. You are much warmer than the desert.
warden:
  name: Warden Emberback
  prose: >-
    The largest dune on the floor stands up, and the ember-bands you
    were admiring turn out to be ribs. Emberback shakes off a hundred
    tons of ash, spreads a mane of live coals, and inhales.
